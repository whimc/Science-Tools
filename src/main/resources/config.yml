# -- WHIMC Science Tools --
mysql:
  enabled: true
  host: localhost
  port: 3306
  database: minecraft
  username: user
  password: pass
conversions:
  fahrenheit:
    expression: "({VAL} * 9.0 / 5.0) + 32.0"
    unit: " °F"
  feet:
    expression: "{VAL} * 3.28084"
    unit: " feet"
  kelvin:
    expression: "{VAL} + 273.15"
    unit: " °K"
  miles:
    expression: "({VAL} * 6371) *.621371"
    unit: " miles"
  psi:
    expression: "{VAL} * 0.145038"
    unit: " psi"
  bar:
    expression: "{VAL} * 0.01"
    unit: " bar"
  hPa:
    expression: "{VAL} * 10.13"
    unit: " hPa"
  radiuskm:
    expression: "{VAL} * 6371"
    unit: " kilometers"
  gravityearth:
    expression: "{VAL} * 0.09807"
    unit: " m/s^2"
  mph:
    expression: "{VAL} * 2.23694"
    unit: " mph"
  mSv:
    expression: "{VAL} * 0.024"
    unit: " mSv per year"
messages:
  disabled-in-world: We don't know how to measure that here
  measure-format: "{MEASUREMENT}"
  numeric-measure-format: The measured {TOOL} is {MEASUREMENT}{UNIT}
tools:
  ALTITUDE:
    aliases:
      - height
    conversions:
      - feet
    default-measurement: "{Y} - 62"
    disabled-worlds:
      - Hub
      - BrownDwarf
      - blackhole
    display-name: altitude
    messages:
      numeric-measure-format: The measured {TOOL} is {MEASUREMENT} {UNIT}
      disabled-in-world: No defined surface present to determine
    precision: 0
    unit: meters
    worlds:
      Mars:
        global-measurement: "{Y} - 120"
      CAMP:
        global-measurement: "{Y} - 120"
      Cancri:
        global-measurement: "{Y} + 150"
      ETLife:
        global-measurement: "{Y} - 80000"
      Kepler:
        global-measurement: "{Y} - 61"
      LunarCrater:
        global-measurement: "{Y} - 72"
      MynoaClose:
        global-measurement: "{Y} + 50"
      MynoaHalf:
        global-measurement: "{Y} + 120"
      MynoaFar:
        global-measurement: "{Y} + 50"
      MynoaMangrove:
        global-measurement: "{Y} + 30"
  AIRFLOW:
    aliases:
      - wind
    conversions:
      - mph
    default-measurement: max(0, rand(-0.1, 0.1) + ({ALTITUDE} / 15))
    disabled-worlds:
      - ETLife
      - blackhole
    display-name: airflow
    messages:
      disabled-in-world: The circulation of particles is unknown
      numeric-measure-format: The measured {TOOL} is {MEASUREMENT}{UNIT}
    precision: 2
    unit: " m/s"
    worlds:
      BrownDwarf:
        global-measurement: 100 + rand(0,200)
      Cancri:
        global-measurement: 0.5 + rand(-0.5, 2.5) + ({ALTITUDE}/20)
      CancriCold:
        global-measurement: 0.5 + rand(-0.5, 2.5) + ({ALTITUDE}/20)
      ColderCold:
        global-measurement: 3.8 + rand(3, 15)
        regions:
          poi_cscunderground: (0.1)
      ColderStrip:
        global-measurement: 3.8 + rand(1, 5)
      ColderHot:
        global-measurement: 3.8 + rand(5, 20)
        regions:
          poi_cshunderground: (0.1 + rand(1.0,2.0)        
      EarthControl:
        regions:
          tent: "0"
          ocean: "0"
      Gliese:
        global-measurement: 0.5 + rand(-0.5, 2.5)
      Hub:
        global-measurement: "0"
      Kepler:
        global-measurement: 1.8 + rand(-0.1, 0.1)
        regions:
          kepler_habitat: 0.3 + rand(-0.01,0.01)
      TwoMoonsLluna:
        global-measurement: "0"
      LunarCrater:
        global-measurement: "0"
        regions:
          3dprintingunderground: 0.7 + rand(-0.03,0.03)
          lunarpbs: 0.7 + rand(-0.02,0.03)
          biodome: "0.3"
          habitationdomes: 0.8 + rand(-0.03,0.03)
          pressuretest1: 0.6 + rand(-0.02,0.02)
          pressuretest2: 0.6 + rand(-0.02,0.02)
          pressuretest3: 0.6 + rand(-0.02,0.02)
          pressuretest4: 0.6 + rand(-0.02,0.02)
          dockingdome: 0.8 + rand(-0.03,0.03)
          suitup: 0.8 + rand(-0.03,0.03)
          icestoragefront: 0.3 + rand(-0.03,0.03)
          icestoragecave: 0.5 + rand(-0.03,0.03)
      Mars:
        global-measurement: 0.1 + rand(-0.1, 3)
      CAMP:
        global-measurement: 0.1 + rand(-0.1, 3)
      MynoaClose:
        global-measurement: max(0, rand(-0.1, 0.1) + ({ALTITUDE} / 30))
        regions:
          ocean: "0"
      MynoaFar:
        global-measurement: max(0, rand(-2.1, 2.1) + ({ALTITUDE} / 8))
        regions:
          lake: "0"
          lake-2: "0"
          lake-3: "0"
      MynoaHalf:
        global-measurement: max(0, rand(8.1, 32.1) + ({ALTITUDE} / 12))
      MynoaMangrove:
        global-measurement: max(0, rand(-2.1, 2.1) + ({ALTITUDE} / 8))
      NoMoon:
        global-measurement: 5 + rand(5, 25) + ({ALTITUDE} / 3)
        regions:
          nomoon_house: "0.3"
      TiltedFrozen:
        global-measurement: 3.8 + rand(-0.1, 0.1)
        regions:
          ocean: "0"
      TiltedWarm:
        global-measurement: 3.8 + rand(-0.1, 0.1)
